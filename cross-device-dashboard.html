<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Device Trajectory Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            color: #0f172a;
            padding: 20px;
            min-height: 100vh;
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
            background: #f8fafc;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: linear-gradient(120deg, #1d4ed8 0%, #1e40af 100%);
            color: #ffffff;
            padding: 24px;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            opacity: 0.95;
            margin-bottom: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #22c55e;
            color: #052e16;
        }

        .btn-secondary {
            background: #ffffff;
            color: #1e3a8a;
        }

        .btn-danger {
            background: #ef4444;
            color: #ffffff;
        }

        .content {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
        }

        .card.full {
            grid-column: 1 / -1;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
        }

        .muted {
            color: #64748b;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 4px 10px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 12px;
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #94a3b8;
        }

        .dot.ok {
            background: #22c55e;
        }

        .dot.warn {
            background: #f59e0b;
        }

        .dot.err {
            background: #ef4444;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 12px;
        }

        .stat {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            background: #f8fafc;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .kv {
            line-height: 1.8;
        }

        .table-wrap {
            overflow: auto;
            max-height: 440px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #ffffff;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 700;
            background: #dbeafe;
            color: #1e3a8a;
        }

        @media (max-width: 960px) {
            .content {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="title">Cross-Device Trajectory Dashboard</h1>
            <p class="subtitle">
                Source: Supabase table <code>public.trajectory_points</code>. Auto refresh every 10s.
            </p>
            <div class="controls">
                <button class="btn btn-primary" onclick="loadAllData()">Refresh Now</button>
                <button class="btn btn-secondary" onclick="exportData()">Export JSON</button>
                <button class="btn btn-danger" onclick="clearLocalConfig()">Clear Local Config</button>
            </div>
        </header>

        <main class="content">
            <section class="card">
                <div class="card-title">Overview</div>
                <div class="stats" id="stats-grid"></div>
            </section>

            <section class="card">
                <div class="card-title">Connection</div>
                <p><span class="status"><span id="status-dot" class="dot"></span><span id="status-text">Idle</span></span></p>
                <div class="kv muted" id="connection-kv" style="margin-top:10px"></div>
            </section>

            <section class="card">
                <div class="card-title">Top Active Users</div>
                <div id="users-box" class="muted">No data yet.</div>
            </section>

            <section class="card">
                <div class="card-title">Runtime</div>
                <div class="kv muted" id="runtime-kv"></div>
            </section>

            <section class="card full">
                <div class="card-title">Recent Records</div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>User</th>
                                <th>Device</th>
                                <th>Type</th>
                                <th>Pos</th>
                                <th>Page</th>
                            </tr>
                        </thead>
                        <tbody id="records-body">
                            <tr><td colspan="6" class="muted">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script>
        const DEFAULT_CONFIG = {
            provider: "supabase",
            supabaseUrl: "https://xmphfiybozqlnzbkddsl.supabase.co",
            supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtcGhmaXlib3pxbG56YmtkZHNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTI1NzYsImV4cCI6MjA5NDY2ODU3Nn0.ix7ZHCgTvsY6kspFqkSoz3Z4zeWACqis29a5fkJchm8",
            refreshMs: 10000,
            queryLimit: 1500,
            tableName: "trajectory_points"
        };

        const STORAGE_KEYS = {
            provider: "ks_cloud_provider",
            url: "ks_supabase_url",
            key: "ks_supabase_anon_key"
        };

        let allRows = [];
        let refreshTimer = null;
        let loading = false;
        let lastUpdated = null;

        function normalizeSupabaseBaseUrl(rawUrl) {
            const value = (rawUrl || "").trim();
            if (!value) return "";

            try {
                const parsed = new URL(value);
                parsed.hash = "";
                parsed.search = "";
                let path = parsed.pathname.replace(/\/+$/, "");
                path = path.replace(/\/rest\/v1$/i, "");
                parsed.pathname = path || "/";
                return parsed.toString().replace(/\/$/, "");
            } catch (_) {
                return value
                    .split("?")[0]
                    .split("#")[0]
                    .replace(/\/+$/, "")
                    .replace(/\/rest\/v1$/i, "");
            }
        }

        function applyUrlConfig() {
            try {
                const params = new URLSearchParams(window.location.search);
                const provider = params.get("provider") || params.get("cloudProvider");
                const supabaseUrl = params.get("supabaseUrl");
                const supabaseKey = params.get("supabaseKey") || params.get("supabaseAnonKey");

                if (provider) localStorage.setItem(STORAGE_KEYS.provider, provider.toLowerCase());
                if (supabaseUrl) localStorage.setItem(STORAGE_KEYS.url, normalizeSupabaseBaseUrl(supabaseUrl));
                if (supabaseKey) localStorage.setItem(STORAGE_KEYS.key, supabaseKey.trim());
            } catch (err) {
                console.warn("read URL config failed", err);
            }
        }

        function ensureDefaultConfig() {
            if (!localStorage.getItem(STORAGE_KEYS.provider)) localStorage.setItem(STORAGE_KEYS.provider, DEFAULT_CONFIG.provider);
            if (!localStorage.getItem(STORAGE_KEYS.url)) localStorage.setItem(STORAGE_KEYS.url, DEFAULT_CONFIG.supabaseUrl);
            if (!localStorage.getItem(STORAGE_KEYS.key)) localStorage.setItem(STORAGE_KEYS.key, DEFAULT_CONFIG.supabaseAnonKey);
        }

        function getConfig() {
            const provider = (localStorage.getItem(STORAGE_KEYS.provider) || DEFAULT_CONFIG.provider).toLowerCase();
            const supabaseUrl = normalizeSupabaseBaseUrl(localStorage.getItem(STORAGE_KEYS.url) || DEFAULT_CONFIG.supabaseUrl);
            const supabaseAnonKey = localStorage.getItem(STORAGE_KEYS.key) || DEFAULT_CONFIG.supabaseAnonKey;
            return {
                provider,
                supabaseUrl,
                supabaseAnonKey,
                enabled: provider === "supabase" && !!supabaseUrl && !!supabaseAnonKey
            };
        }

        function setStatus(kind, text) {
            const dot = document.getElementById("status-dot");
            const statusText = document.getElementById("status-text");
            dot.className = "dot " + (kind || "");
            statusText.textContent = text;
        }

        function showConnectionInfo(conf, extra) {
            const box = document.getElementById("connection-kv");
            const lines = [
                "provider: " + conf.provider,
                "supabaseUrl: " + conf.supabaseUrl,
                "enabled: " + String(conf.enabled),
                "lastUpdated: " + (lastUpdated ? lastUpdated.toLocaleString() : "never"),
                "rows: " + allRows.length
            ];
            if (extra) lines.push(extra);
            box.innerHTML = lines.map(function (x) { return "<div>" + escapeHtml(x) + "</div>"; }).join("");
        }

        async function loadAllData() {
            if (loading) return;
            const conf = getConfig();
            showConnectionInfo(conf);

            if (!conf.enabled) {
                setStatus("warn", "Cloud config missing");
                renderNoData("Cloud config missing. Set localStorage ks_supabase_url / ks_supabase_anon_key.");
                return;
            }

            loading = true;
            setStatus("warn", "Loading...");

            try {
                const endpoint = conf.supabaseUrl.replace(/\/$/, "") + "/rest/v1/" + DEFAULT_CONFIG.tableName;
                const params = new URLSearchParams({
                    select: "id,user_id,device_id,page_url,event_type,x,y,timestamp,created_at",
                    order: "timestamp.desc",
                    limit: String(DEFAULT_CONFIG.queryLimit)
                });

                const response = await fetch(endpoint + "?" + params.toString(), {
                    method: "GET",
                    headers: {
                        apikey: conf.supabaseAnonKey,
                        Authorization: "Bearer " + conf.supabaseAnonKey
                    }
                });

                if (!response.ok) {
                    const detail = await response.text();
                    throw new Error("Supabase query failed: " + response.status + " " + detail);
                }

                const rows = await response.json();
                if (!Array.isArray(rows)) {
                    throw new Error("Supabase response is not an array");
                }

                allRows = rows;
                lastUpdated = new Date();
                setStatus("ok", "Connected");
                showConnectionInfo(conf);
                renderAll();
            } catch (err) {
                setStatus("err", "Load failed");
                showConnectionInfo(conf, "error: " + err.message);
                renderNoData("Failed to load: " + err.message);
            } finally {
                loading = false;
                renderRuntime();
            }
        }

        function renderAll() {
            renderStats();
            renderUsers();
            renderTable();
            renderRuntime();
        }

        function renderStats() {
            const total = allRows.length;
            const users = new Set();
            const devices = new Set();
            let moves = 0;
            let clicks = 0;
            let scrolls = 0;

            allRows.forEach(function (r) {
                if (r.user_id) users.add(r.user_id);
                if (r.device_id) devices.add(r.device_id);
                if (r.event_type === "mousemove") moves += 1;
                else if (r.event_type === "mousedown") clicks += 1;
                else if (r.event_type === "scroll") scrolls += 1;
            });

            const stats = [
                { label: "Records", value: total },
                { label: "Users", value: users.size },
                { label: "Devices", value: devices.size },
                { label: "Moves", value: moves },
                { label: "Clicks", value: clicks },
                { label: "Scrolls", value: scrolls },
                { label: "Refresh(s)", value: DEFAULT_CONFIG.refreshMs / 1000 },
                { label: "Table", value: "trajectory_points" }
            ];

            const grid = document.getElementById("stats-grid");
            grid.innerHTML = stats.map(function (s) {
                return (
                    '<div class="stat">' +
                        '<div class="stat-value">' + escapeHtml(String(s.value)) + "</div>" +
                        '<div class="stat-label">' + escapeHtml(s.label) + "</div>" +
                    "</div>"
                );
            }).join("");
        }

        function renderUsers() {
            const box = document.getElementById("users-box");
            if (!allRows.length) {
                box.textContent = "No data yet.";
                return;
            }

            const map = new Map();
            allRows.forEach(function (r) {
                const key = r.user_id || "unknown_user";
                if (!map.has(key)) {
                    map.set(key, { user: key, count: 0, devices: new Set(), last: 0 });
                }
                const item = map.get(key);
                item.count += 1;
                if (r.device_id) item.devices.add(r.device_id);
                if (r.timestamp && Number(r.timestamp) > item.last) item.last = Number(r.timestamp);
            });

            const arr = Array.from(map.values()).sort(function (a, b) { return b.count - a.count; }).slice(0, 10);
            box.innerHTML = arr.map(function (u) {
                const lastText = u.last ? new Date(u.last).toLocaleString() : "n/a";
                return (
                    "<div style=\"padding:8px 0;border-bottom:1px solid #e2e8f0\">" +
                        "<div><strong>" + escapeHtml(shortId(u.user)) + "</strong> " +
                        "<span class=\"badge\">records: " + u.count + "</span></div>" +
                        "<div class=\"muted\">devices: " + u.devices.size + " | last: " + escapeHtml(lastText) + "</div>" +
                    "</div>"
                );
            }).join("");
        }

        function renderTable() {
            const body = document.getElementById("records-body");
            if (!allRows.length) {
                body.innerHTML = "<tr><td colspan=\"6\" class=\"muted\">No rows.</td></tr>";
                return;
            }

            const rows = allRows.slice(0, 120);
            body.innerHTML = rows.map(function (r) {
                const ts = r.timestamp ? new Date(Number(r.timestamp)).toLocaleString() : "n/a";
                const pos = (isNum(r.x) && isNum(r.y)) ? "(" + Math.round(Number(r.x)) + ", " + Math.round(Number(r.y)) + ")" : "-";
                const page = simplifyUrl(r.page_url);
                return (
                    "<tr>" +
                        "<td>" + escapeHtml(ts) + "</td>" +
                        "<td>" + escapeHtml(shortId(r.user_id)) + "</td>" +
                        "<td>" + escapeHtml(shortId(r.device_id)) + "</td>" +
                        "<td>" + escapeHtml(r.event_type || "-") + "</td>" +
                        "<td>" + escapeHtml(pos) + "</td>" +
                        "<td title=\"" + escapeHtml(r.page_url || "") + "\">" + escapeHtml(page) + "</td>" +
                    "</tr>"
                );
            }).join("");
        }

        function renderRuntime() {
            const box = document.getElementById("runtime-kv");
            const lines = [
                "auto refresh(ms): " + DEFAULT_CONFIG.refreshMs,
                "query limit: " + DEFAULT_CONFIG.queryLimit,
                "current rows in memory: " + allRows.length,
                "last updated: " + (lastUpdated ? lastUpdated.toLocaleString() : "never")
            ];
            box.innerHTML = lines.map(function (x) { return "<div>" + escapeHtml(x) + "</div>"; }).join("");
        }

        function renderNoData(message) {
            document.getElementById("stats-grid").innerHTML = "";
            document.getElementById("users-box").textContent = message;
            document.getElementById("records-body").innerHTML = "<tr><td colspan=\"6\" class=\"muted\">" + escapeHtml(message) + "</td></tr>";
            renderRuntime();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(allRows, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "supabase-trajectory-" + new Date().toISOString().slice(0, 19).replace(/:/g, "-") + ".json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function clearLocalConfig() {
            if (!confirm("Clear local cloud config in this browser?")) return;
            localStorage.removeItem(STORAGE_KEYS.provider);
            localStorage.removeItem(STORAGE_KEYS.url);
            localStorage.removeItem(STORAGE_KEYS.key);
            ensureDefaultConfig();
            loadAllData();
        }

        function simplifyUrl(url) {
            if (!url) return "-";
            try {
                const u = new URL(url);
                const text = u.hostname + u.pathname;
                return text.length > 40 ? text.slice(0, 40) + "..." : text;
            } catch (_) {
                return String(url).slice(0, 40);
            }
        }

        function shortId(v) {
            const x = String(v || "-");
            return x.length > 18 ? x.slice(0, 8) + "..." + x.slice(-6) : x;
        }

        function isNum(v) {
            return v !== null && v !== undefined && Number.isFinite(Number(v));
        }

        function escapeHtml(v) {
            return String(v)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        document.addEventListener("DOMContentLoaded", function () {
            ensureDefaultConfig();
            applyUrlConfig();
            loadAllData();
            refreshTimer = setInterval(loadAllData, DEFAULT_CONFIG.refreshMs);
        });

        window.addEventListener("beforeunload", function () {
            if (refreshTimer) clearInterval(refreshTimer);
        });
    </script>
</body>
</html>
