<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨设备轨迹监控仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .dashboard-header h1 .icon {
            font-size: 2rem;
        }
        
        .dashboard-header p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 800px;
        }
        
        .dashboard-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .control-btn.primary {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        
        .control-btn.warning {
            background: #ff9800;
            border-color: #ff9800;
        }
        
        .control-btn.danger {
            background: #f44336;
            border-color: #f44336;
        }
        
        .dashboard-content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 1200px) {
            .dashboard-content {
                grid-template-columns: 1fr;
            }
        }
        
        .dashboard-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-icon {
            font-size: 1.8rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }
        
        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        .user-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .device-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #f3e5f5;
            color: #7b1fa2;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .timestamp {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #666;
        }
        
        .chart-container {
            height: 300px;
            margin-top: 20px;
            position: relative;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-active {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        
        .status-inactive {
            background: #9e9e9e;
        }
        
        .status-syncing {
            background: #ff9800;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .alert-info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 5px solid #1976d2;
        }
        
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #2e7d32;
        }
        
        .alert-warning {
            background: #fff3e0;
            color: #f57c00;
            border-left: 5px solid #f57c00;
        }
        
        .alert-error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 5px solid #d32f2f;
        }
        
        .code-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin-top: 20px;
        }
        
        .json-key {
            color: #9cdcfe;
        }
        
        .json-string {
            color: #ce9178;
        }
        
        .json-number {
            color: #b5cea8;
        }
        
        .json-boolean {
            color: #569cd6;
        }
        
        .json-null {
            color: #569cd6;
        }
        
        .refresh-indicator {
            font-size: 0.9rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
        }
        
        .bin-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        
        .bin-url {
            color: #1976d2;
            text-decoration: none;
        }
        
        .bin-url:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>
                <span class="icon">🌐</span>
                跨设备轨迹监控仪表板
            </h1>
            <p>实时监控所有设备访问轨迹数据，支持多设备、多用户数据收集与展示</p>
            
            <div class="dashboard-controls">
                <button class="control-btn primary" onclick="loadAllData()">
                    <span>🔄</span> 加载所有数据
                </button>
                <button class="control-btn" onclick="refreshData()">
                    <span>📊</span> 刷新统计
                </button>
                <button class="control-btn warning" onclick="clearLocalData()">
                    <span>🗑️</span> 清空本地缓存
                </button>
                <button class="control-btn" onclick="showJsonBinInfo()">
                    <span>🔗</span> JSONBin信息
                </button>
                <button class="control-btn" onclick="exportData()">
                    <span>📥</span> 导出数据
                </button>
                <button class="control-btn danger" onclick="resetSystem()">
                    <span>⚠️</span> 重置系统
                </button>
            </div>
        </div>
        
        <div class="dashboard-content">
            <!-- 左侧：统计数据 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-icon">📈</span>
                        系统统计
                    </h3>
                    <div class="refresh-indicator">
                        <span class="status-indicator status-active"></span>
                        实时更新
                    </div>
                </div>
                
                <div id="stats-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载统计数据...</p>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：用户列表 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-icon">👥</span>
                        活跃用户
                    </h3>
                    <span id="user-count">0</span> 用户
                </div>
                
                <div id="users-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载用户数据...</p>
                    </div>
                </div>
            </div>
            
            <!-- 全宽：轨迹数据 -->
            <div class="dashboard-card" style="grid-column: span 2;">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-icon">📍</span>
                        轨迹数据记录
                    </h3>
                    <div>
                        <span id="record-count">0</span> 条记录
                    </div>
                </div>
                
                <div id="data-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载轨迹数据...</p>
                    </div>
                </div>
            </div>
            
            <!-- 左侧：系统信息 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-icon">⚙️</span>
                        系统信息
                    </h3>
                </div>
                
                <div id="system-info">
                    <div class="loading">
                        <p>正在加载系统信息...</p>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：JSONBin信息 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-icon">🔗</span>
                        JSONBin存储
                    </h3>
                </div>
                
                <div id="jsonbin-info">
                    <div class="loading">
                        <p>正在加载JSONBin信息...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 配置
        const CONFIG = {
            jsonbinUrl: 'https://api.jsonbin.io/v3/b',
            binId: null,
            refreshInterval: 10000, // 10秒刷新一次
            maxRecords: 1000,
            apiKey: '$2a$10$wLWZc.7jB6sFc6oD5J8QnO' // 公开的只读密钥
        };
        
        // 全局数据
        let allData = [];
        let users = new Set();
        let devices = new Set();
        let refreshTimer = null;
        let isRefreshing = false;
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 跨设备仪表板初始化');
            
            // 尝试从URL获取bin ID
            const urlParams = new URLSearchParams(window.location.search);
            const binIdFromUrl = urlParams.get('bin');
            
            if (binIdFromUrl) {
                CONFIG.binId = binIdFromUrl;
                localStorage.setItem('ks_cross_device_bin_id', binIdFromUrl);
                console.log('从URL获取bin ID:', binIdFromUrl);
            } else {
                // 尝试从localStorage获取
                const savedBinId = localStorage.getItem('ks_cross_device_bin_id');
                if (savedBinId) {
                    CONFIG.binId = savedBinId;
                    console.log('从localStorage获取bin ID:', savedBinId);
                }
            }
            
            // 显示系统信息
            updateSystemInfo();
            
            // 加载数据
            loadAllData();
            
            // 启动自动刷新
            startAutoRefresh();
            
            // 显示JSONBin信息
            showJsonBinInfo();
        });
        
        // 加载所有数据
        async function loadAllData() {
            if (isRefreshing) return;
            
            isRefreshing = true;
            showLoading('stats-container', '正在加载统计数据...');
            showLoading('users-container', '正在加载用户数据...');
            showLoading('data-container', '正在加载轨迹数据...');
            
            try {
                if (!CONFIG.binId) {
                    showError('请先设置JSONBin ID');
                    return;
                }
                
                console.log('🔄 从JSONBin加载数据，Bin ID:', CONFIG.binId);
                
                const response = await fetch(
                    `${CONFIG.jsonbinUrl}/${CONFIG.binId}/latest`,
                    {
                        headers: {
                            'X-Master-Key': CONFIG.apiKey,
                            'X-Bin-Meta': 'false'
                        }
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                allData = await response.json();
                console.log('✅ 数据加载成功，记录数:', allData.length);
                
                // 分析数据
                analyzeData();
                
                // 更新显示
                updateStats();
                updateUsers();
                updateDataTable();
                
                // 显示成功消息
                showAlert('数据加载成功！', 'success');
                
            } catch (error) {
                console.error('❌ 加载数据失败:', error);
                showError('加载数据失败: ' + error.message);
                
                // 显示错误信息
                showAlert('数据加载失败: ' + error.message, 'error');
                
            } finally {
                isRefreshing = false;
            }
        }
        
        // 分析数据
        function analyzeData() {
            users.clear();
            devices.clear();
            
            allData.forEach(record => {
                if (record.u) users.add(record.u);
                if (record.d) devices.add(record.d);
            });
            
            console.log('数据分析完成:');
            console.log('- 总记录数:', allData.length);
            console.log('- 用户数:', users.size);
            console.log('- 设备数:', devices.size);
        }
        
        // 更新统计信息
        function updateStats() {
            const statsContainer = document.getElementById('stats-container');
            
            if (allData.length === 0) {
                statsContainer.innerHTML = `
                    <div class="alert alert-warning">
                        <span>⚠️</span>
                        <div>
                            <strong>无数据</strong>
                            <p>请确保主测试页面正在运行并同步数据</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 计算统计
            const moves = allData.filter(r => r.type === 'move').length;
            const clicks = allData.filter(r => r.type === 'click').length;
            
            // 按用户分组
            const userStats = {};
            allData.forEach(record => {
                if (record.u) {
                    if (!userStats[record.u]) {
                        userStats[record.u] = { moves: 0, clicks: 0 };
                    }
                    if (record.type === 'move') userStats[record.u].moves++;
                    if (record.type === 'click') userStats[record.u].clicks++;
                }
            });
            
            // 按设备分组
            const deviceStats = {};
            allData.forEach(record => {
                if (record.d) {
                    if (!deviceStats[record.d]) {
                        deviceStats[record.d] = { moves: 0, clicks: 0 };
                    }
                    if (record.type === 'move') deviceStats[record.d].moves++;
                    if (record.type === 'click') deviceStats[record.d].clicks++;
                }
            });
            
            // 时间范围
            const timestamps = allData.map(r => r.t).filter(t => t);
            const minTime = timestamps.length > 0 ? Math.min(...timestamps) : null;
            const maxTime = timestamps.length > 0 ? Math.max(...timestamps) : null;
            const timeRange = minTime && maxTime ? 
                Math.round((maxTime - minTime) / 1000 / 60) + ' 分钟' : '未知';
            
            statsContainer.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value">${allData.length}</div>
                        <div class="stat-label">总记录数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${users.size}</div>
                        <div class="stat-label">用户数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${devices.size}</div>
                        <div class="stat-label">设备数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${moves}</div>
                        <div class="stat-label">移动事件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${clicks}</div>
                        <div class="stat-label">点击事件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${timeRange}</div>
                        <div class="stat-label">时间范围</div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 15px; color: #2c3e50;">用户活动排名</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;">
                        ${Object.entries(userStats)
                            .sort((a, b) => (b[1].moves + b[1].clicks) - (a[1].moves + a[1].clicks))
                            .slice(0, 5)
                            .map(([userId, stats]) => `
                                <div style="background: #f8f9fa; padding: 15px; border-radius: 10px;">
                                    <div style="font-weight: 600; color: #1e3c72; margin-bottom: 5px;">
                                        <span class="user-badge">${userId}</span>
                                    </div>
                                    <div style="font-size: 0.9rem; color: #666;">
                                        移动: ${stats.moves} | 点击: ${stats.clicks}
                                    </div>
                                </div>
                            `).join('')}
                    </div>
                </div>
            `;
        }
        
        // 更新用户列表
        function updateUsers() {
            const usersContainer = document.getElementById('users-container');
            const userCountElement = document.getElementById('user-count');
            
            userCountElement.textContent = users.size;
            
            if (users.size === 0) {
                usersContainer.innerHTML = `
                    <div class="alert alert-warning">
                        <span>👤</span>
                        <div>
                            <strong>暂无用户数据</strong>
                            <p>等待用户访问主测试页面</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 按用户最近活动时间排序
            const userActivities = Array.from(users).map(userId => {
                const userRecords = allData.filter(r => r.u === userId);
                const lastActivity = userRecords.length > 0 ? 
                    Math.max(...userRecords.map(r => r.t)) : 0;
                return { userId, lastActivity, recordCount: userRecords.length };
            }).sort((a, b) => b.lastActivity - a.lastActivity);
            
            usersContainer.innerHTML = `
                <div style="display: grid; gap: 15px;">
                    ${userActivities.map(user => `
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 4px solid #3498db;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <div>
                                    <span class="user-badge">${user.userId}</span>
                                    <span style="font-size: 0.85rem; color: #666; margin-left: 10px;">
                                        记录: ${user.recordCount}
                                    </span>
                                </div>
                                <div style="font-size: 0.8rem; color: #999;">
                                    ${formatTime(user.lastActivity)}
                                </div>
                            </div>
                            <div style="font-size: 0.9rem; color: #666;">
                                <div style="display: flex; gap: 15px;">
                                    <span>📱 设备: ${getUserDeviceCount(user.userId)}</span>
                                    <span>📍 最后位置: ${getUserLastLocation(user.userId)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // 获取用户设备数
        function getUserDeviceCount(userId) {
            const devices = new Set();
            allData.filter(r => r.u === userId).forEach(r => {
                if (r.d) devices.add(r.d);
            });
            return devices.size;
        }
        
        // 获取用户最后位置
        function getUserLastLocation(userId) {
            const userRecords = allData.filter(r => r.u === userId);
            if (userRecords.length === 0) return '未知';
            
            const lastRecord = userRecords[userRecords.length - 1];
            return `(${lastRecord.x}, ${lastRecord.y})`;
        }
        
        // 更新数据表格
        function updateDataTable() {
            const dataContainer = document.getElementById('data-container');
            const recordCountElement = document.getElementById('record-count');
            
            recordCountElement.textContent = allData.length;
            
            if (allData.length === 0) {
                dataContainer.innerHTML = `
                    <div class="alert alert-info">
                        <span>📊</span>
                        <div>
                            <strong>暂无轨迹数据</strong>
                            <p>等待用户在主测试页面移动鼠标</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            // 显示最近50条记录
            const recentData = allData.slice(-50).reverse();
            
            dataContainer.innerHTML = `
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>用户</th>
                                <th>设备</th>
                                <th>类型</th>
                                <th>位置</th>
                                <th>页面</th>
                                <th>User Agent</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${recentData.map(record => `
                                <tr>
                                    <td class="timestamp">${formatTime(record.t)}</td>
                                    <td><span class="user-badge">${record.u || '未知'}</span></td>
                                    <td><span class="device-badge">${record.d || '未知'}</span></td>
                                    <td>
                                        ${record.type === 'move' ? '🖱️ 移动' : '🖱️ 点击'}
                                    </td>
                                    <td>(${record.x}, ${record.y})</td>
                                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                        ${record.url || '未知'}
                                    </td>
                                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem;">
                                        ${record.ua || '未知'}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="refresh-indicator">
                    <span class="status-indicator status-active"></span>
                    显示最近50条记录，共${allData.length}条
                </div>
            `;
        }
        
        // 更新系统信息
        function updateSystemInfo() {
            const systemInfo = document.getElementById('system-info');
            
            const info = {
                '当前时间': new Date().toLocaleString('zh-CN'),
                '页面URL': window.location.href,
                '浏览器': navigator.userAgent.substring(0, 50) + '...',
                '屏幕分辨率': `${screen.width} × ${screen.height}`,
                '语言': navigator.language,
                '时区': Intl.DateTimeFormat().resolvedOptions().timeZone,
                'localStorage': `${Math.round(JSON.stringify(localStorage).length / 1024 * 100) / 100} KB`
            };
            
            systemInfo.innerHTML = `
                <div style="display: grid; gap: 10px;">
                    ${Object.entries(info).map(([key, value]) => `
                        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">
                            <span style="font-weight: 600; color: #555;">${key}:</span>
                            <span style="color: #333; font-family: 'Courier New', monospace;">${value}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // 显示JSONBin信息
        function showJsonBinInfo() {
            const jsonbinInfo = document.getElementById('jsonbin-info');
            
            if (!CONFIG.binId) {
                jsonbinInfo.innerHTML = `
                    <div class="alert alert-warning">
                        <span>🔗</span>
                        <div>
                            <strong>未设置JSONBin ID</strong>
                            <p>请从主测试页面获取或手动设置</p>
                            <div style="margin-top: 10px;">
                                <input type="text" id="bin-id-input" placeholder="输入JSONBin ID" 
                                       style="padding: 8px; border: 1px solid #ddd; border-radius: 5px; width: 100%;">
                                <button onclick="setBinId()" 
                                        style="margin-top: 10px; padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                    设置Bin ID
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            const binUrl = `https://jsonbin.io/${CONFIG.binId}`;
            const apiUrl = `${CONFIG.jsonbinUrl}/${CONFIG.binId}/latest`;
            
            jsonbinInfo.innerHTML = `
                <div class="bin-info">
                    <div style="margin-bottom: 10px;">
                        <strong>Bin ID:</strong> ${CONFIG.binId}
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>数据量:</strong> ${allData.length} 条记录
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>查看URL:</strong> 
                        <a href="${binUrl}" target="_blank" class="bin-url">${binUrl}</a>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>API URL:</strong> 
                        <span style="font-size: 0.9rem;">${apiUrl}</span>
                    </div>
                    <div>
                        <strong>状态:</strong> 
                        <span class="status-indicator ${isRefreshing ? 'status-syncing' : 'status-active'}"></span>
                        ${isRefreshing ? '同步中...' : '已连接'}
                    </div>
                </div>
            `;
        }
        
        // 设置Bin ID
        function setBinId() {
            const input = document.getElementById('bin-id-input');
            if (input && input.value) {
                CONFIG.binId = input.value;
                localStorage.setItem('ks_cross_device_bin_id', input.value);
                showAlert('Bin ID已设置', 'success');
                loadAllData();
                showJsonBinInfo();
            }
        }
        
        // 刷新数据
        function refreshData() {
            loadAllData();
            updateSystemInfo();
        }
        
        // 启动自动刷新
        function startAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
            
            refreshTimer = setInterval(() => {
                if (!isRefreshing) {
                    loadAllData();
                }
            }, CONFIG.refreshInterval);
            
            console.log('⏰ 自动刷新已启动，间隔:', CONFIG.refreshInterval, 'ms');
        }
        
        // 清空本地数据
        function clearLocalData() {
            if (confirm('确定要清空所有本地缓存数据吗？')) {
                localStorage.clear();
                sessionStorage.clear();
                allData = [];
                users.clear();
                devices.clear();
                
                updateStats();
                updateUsers();
                updateDataTable();
                
                showAlert('本地缓存已清空', 'success');
            }
        }
        
        // 导出数据
        function exportData() {
            if (allData.length === 0) {
                showAlert('无数据可导出', 'warning');
                return;
            }
            
            const dataStr = JSON.stringify(allData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const dataUrl = URL.createObjectURL(dataBlob);
            
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `trajectory_data_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(dataUrl);
            
            showAlert('数据已导出', 'success');
        }
        
        // 重置系统
        function resetSystem() {
            if (confirm('确定要重置整个系统吗？这将清除所有设置和数据。')) {
                CONFIG.binId = null;
                localStorage.removeItem('ks_cross_device_bin_id');
                localStorage.clear();
                sessionStorage.clear();
                
                allData = [];
                users.clear();
                devices.clear();
                
                if (refreshTimer) {
                    clearInterval(refreshTimer);
                    refreshTimer = null;
                }
                
                // 重新加载页面
                location.reload();
            }
        }
        
        // 工具函数：格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '未知';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }
        
        // 工具函数：显示加载状态
        function showLoading(containerId, message) {
            const container = document.getElementById(containerId);
            if (container) {
                container.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>${message}</p>
                    </div>
                `;
            }
        }
        
        // 工具函数：显示错误
        function showError(message) {
            const statsContainer = document.getElementById('stats-container');
            if (statsContainer) {
                statsContainer.innerHTML = `
                    <div class="alert alert-error">
                        <span>❌</span>
                        <div>
                            <strong>错误</strong>
                            <p>${message}</p>
                        </div>
                    </div>
                `;
            }
        }
        
        // 工具函数：显示提示
        function showAlert(message, type = 'info') {
            // 创建临时提示
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span>${type === 'success' ? '✅' : type === 'warning' ? '⚠️' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <div>${message}</div>
            `;
            
            alert.style.position = 'fixed';
            alert.style.top = '20px';
            alert.style.right = '20px';
            alert.style.zIndex = '10000';
            alert.style.maxWidth = '400px';
            alert.style.boxShadow = '0 5px 15px rgba(0,0,0,0.2)';
            
            document.body.appendChild(alert);
            
            // 3秒后自动消失
            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    if (alert.parentNode) {
                        document.body.removeChild(alert);
                    }
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
